<svg width="128" height="128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" fill="#1a1a2e"/>
  
  <!-- Banknote -->
  <rect x="20" y="40" width="88" height="48" rx="4" fill="#4a5d23" stroke="#2d3a0f" stroke-width="2"/>
  <rect x="24" y="44" width="80" height="40" rx="2" fill="none" stroke="#8b9556" stroke-width="1"/>
  
  <!-- Dollar sign -->
  <text x="64" y="72" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#c8dc96" text-anchor="middle">$</text>
  
  <!-- Honey drop -->
  <ellipse cx="90" cy="30" rx="12" ry="16" fill="#f5a623"/>
  <ellipse cx="90" cy="28" rx="8" ry="12" fill="#ffd700"/>
  <path d="M 90 14 Q 88 20 90 26" fill="none" stroke="#fff" stroke-width="2" opacity="0.6"/>
  
  <!-- Magnifying glass -->
  <circle cx="35" cy="95" r="14" fill="none" stroke="#c0c0c0" stroke-width="3"/>
  <circle cx="35" cy="95" r="10" fill="#a0d8ef" opacity="0.3"/>
  <line x1="45" y1="105" x2="55" y2="115" stroke="#8b4513" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Question mark -->
  <text x="100" y="110" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ff6b6b" text-anchor="middle">?</text>
</svg>
